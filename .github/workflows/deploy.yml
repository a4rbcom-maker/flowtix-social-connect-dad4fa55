name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  DEPLOY_PATH: /www/wwwroot/flowtixtools.com
  APP_NAME: flowtixtools-web
  APP_PORT: 3000

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build project (Node target)
        run: bun run build

      - name: Verify build output
        run: |
          set -e
          if [ ! -d ".output" ] && [ ! -d "dist" ]; then
            echo "::error::Build did not produce .output or dist directory"
            ls -la
            exit 1
          fi
          echo "--- build output tree (top) ---"
          [ -d ".output" ] && ls -la .output || true
          [ -d ".output/server" ] && ls -la .output/server || true
          [ -d ".output/public" ] && ls -la .output/public || true
          [ -d ".output/public/assets" ] && echo ".output assets count: $(ls .output/public/assets | wc -l)" || true
          [ -d "dist" ] && ls -la dist || true
          [ -d "dist/server" ] && ls -la dist/server || true
          [ -d "dist/client" ] && ls -la dist/client || true
          [ -d "dist/client/assets" ] && echo "dist assets count: $(ls dist/client/assets | wc -l)" || true

      - name: Setup SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_IP: ${{ secrets.SERVER_IP }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          set -euo pipefail
          : "${SSH_PRIVATE_KEY:?Missing GitHub Secret: SSH_PRIVATE_KEY}"
          SERVER_HOST="${SERVER_IP:-${SSH_HOST:-}}"
          : "${SERVER_HOST:?Missing GitHub Secret: SERVER_IP or SSH_HOST}"
          SSH_PORT="${SSH_PORT:-22}"
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SSH_PORT" -H "$SERVER_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy build artifacts via rsync (scoped to this project only)
        env:
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SERVER_IP: ${{ secrets.SERVER_IP }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          set -euo pipefail
          DEPLOY_USER="${SERVER_USER:-${SSH_USER:-}}"
          SERVER_HOST="${SERVER_IP:-${SSH_HOST:-}}"
          SSH_PORT="${SSH_PORT:-22}"

          # Safety: never operate outside /www/wwwroot/flowtixtools.com
          case "$DEPLOY_PATH" in
            /www/wwwroot/flowtixtools.com|/www/wwwroot/flowtixtools.com/*) : ;;
            *) echo "::error::Refusing to deploy outside flowtixtools.com path"; exit 1 ;;
          esac

          ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" -o StrictHostKeyChecking=no \
            "${DEPLOY_USER}@${SERVER_HOST}" "mkdir -p ${DEPLOY_PATH}/.output ${DEPLOY_PATH}/dist"

          cat > .deploy-version <<EOF
          repo=${GITHUB_REPOSITORY}
          sha=${GITHUB_SHA}
          run_id=${GITHUB_RUN_ID}
          deployed_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          path=${DEPLOY_PATH}
          EOF

          # 1) Sync the full .output (server runtime) — scoped to this project's .output only
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -p $SSH_PORT -o StrictHostKeyChecking=no" \
            ./.output/ \
            "${DEPLOY_USER}@${SERVER_HOST}:${DEPLOY_PATH}/.output/"

          # Also sync dist because the existing aaPanel site currently contains dist/client + dist/server.
          if [ -d "dist" ]; then
            rsync -avz --delete \
              -e "ssh -i ~/.ssh/deploy_key -p $SSH_PORT -o StrictHostKeyChecking=no" \
              ./dist/ \
              "${DEPLOY_USER}@${SERVER_HOST}:${DEPLOY_PATH}/dist/"
          fi

          # 2) Mirror static public assets to the web root so Nginx can serve /assets/*
          if [ -d ".output/public" ]; then
            rsync -avz \
              -e "ssh -i ~/.ssh/deploy_key -p $SSH_PORT -o StrictHostKeyChecking=no" \
              ./.output/public/ \
              "${DEPLOY_USER}@${SERVER_HOST}:${DEPLOY_PATH}/"
          elif [ -d "dist/client" ]; then
            rsync -avz \
              -e "ssh -i ~/.ssh/deploy_key -p $SSH_PORT -o StrictHostKeyChecking=no" \
              ./dist/client/ \
              "${DEPLOY_USER}@${SERVER_HOST}:${DEPLOY_PATH}/"
          else
            echo "::warning::No static public output found — skipping static mirror"
          fi

          rsync -avz \
            -e "ssh -i ~/.ssh/deploy_key -p $SSH_PORT -o StrictHostKeyChecking=no" \
            ./.deploy-version \
            "${DEPLOY_USER}@${SERVER_HOST}:${DEPLOY_PATH}/.deploy-version"

      - name: Verify files on server and restart PM2 app (scoped)
        env:
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SERVER_IP: ${{ secrets.SERVER_IP }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          set -euo pipefail
          DEPLOY_USER="${SERVER_USER:-${SSH_USER:-}}"
          SERVER_HOST="${SERVER_IP:-${SSH_HOST:-}}"
          SSH_PORT="${SSH_PORT:-22}"
          ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" -o StrictHostKeyChecking=no \
            "${DEPLOY_USER}@${SERVER_HOST}" \
            "DEPLOY_PATH='${DEPLOY_PATH}' APP_NAME='${APP_NAME}' APP_PORT='${APP_PORT}' bash -s" <<'EOSSH'
            set -e
            cd "$DEPLOY_PATH"

            echo "=== Deployed files (top level) ==="
            ls -la | head -n 40

            echo "=== assets directory ==="
            if [ -d "assets" ]; then
              echo "assets file count: $(ls assets | wc -l)"
              ls assets | head -n 10
            else
              echo "ERROR: assets directory missing in $DEPLOY_PATH — static files will 404"
              exit 1
            fi

            ENTRY=""
            for c in .output/server/index.mjs .output/server/index.js .output/index.mjs; do
              if [ -f "$c" ]; then ENTRY="$c"; break; fi
            done
            if [ -z "$ENTRY" ]; then
              echo "ERROR: no server entry found under .output"
              find .output -maxdepth 3 -type f | head
              exit 1
            fi
            echo "Using entry: $ENTRY"

            export PORT="$APP_PORT"
            export NODE_ENV=production

            # PM2 is scoped strictly to this app name — won't touch other projects.
            if pm2 describe "$APP_NAME" > /dev/null 2>&1; then
              pm2 restart "$APP_NAME" --update-env
            else
              pm2 start "$ENTRY" --name "$APP_NAME" --update-env
            fi
            pm2 save

            echo "=== Local Node app health check ==="
            for i in $(seq 1 20); do
              if curl -fsS "http://127.0.0.1:${APP_PORT}/" >/dev/null; then
                echo "Node app is responding on 127.0.0.1:${APP_PORT}"
                break
              fi
              if [ "$i" -eq 20 ]; then
                echo "ERROR: Node app is not responding on 127.0.0.1:${APP_PORT}"
                pm2 logs "$APP_NAME" --lines 80 --nostream || true
                exit 1
              fi
              sleep 2
            done

            echo "=== PM2 status for $APP_NAME ==="
            pm2 describe "$APP_NAME" | head -n 30 || true
EOSSH

      - name: Configure Nginx for this domain only and verify public site
        env:
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SERVER_IP: ${{ secrets.SERVER_IP }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          set -euo pipefail
          DEPLOY_USER="${SERVER_USER:-${SSH_USER:-}}"
          SERVER_HOST="${SERVER_IP:-${SSH_HOST:-}}"
          SSH_PORT="${SSH_PORT:-22}"
          ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" -o StrictHostKeyChecking=no \
            "${DEPLOY_USER}@${SERVER_HOST}" \
            "DEPLOY_PATH='${DEPLOY_PATH}' APP_NAME='${APP_NAME}' APP_PORT='${APP_PORT}' bash -s" <<'EOSSH'
            set -e
            CONF="/www/server/panel/vhost/nginx/flowtixtools.com.conf"
            BACKUP="${CONF}.bak.$(date +%Y%m%d%H%M%S)"

            if [ ! -f "$CONF" ]; then
              echo "ERROR: Nginx vhost file not found: $CONF"
              exit 1
            fi

            if ! grep -q "server_name .*flowtixtools.com" "$CONF"; then
              echo "ERROR: $CONF does not look like the flowtixtools.com vhost. Refusing to edit."
              exit 1
            fi

            cp "$CONF" "$BACKUP"
            python3 - <<'PY'
from pathlib import Path

conf = Path('/www/server/panel/vhost/nginx/flowtixtools.com.conf')
text = conf.read_text()
port = '3000'
root = '/www/wwwroot/flowtixtools.com'
managed_start = '    # FLOWTIXTOOLS_NODE_APP_START'
managed_end = '    # FLOWTIXTOOLS_NODE_APP_END'
block = f'''{managed_start}\n    location /assets/ {{\n        alias {root}/assets/;\n        access_log off;\n        expires 1y;\n        add_header Cache-Control "public, immutable";\n        try_files $uri =404;\n    }}\n\n    location / {{\n        proxy_pass http://127.0.0.1:{port};\n        proxy_http_version 1.1;\n        proxy_set_header Host $host;\n        proxy_set_header X-Real-IP $remote_addr;\n        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;\n        proxy_set_header X-Forwarded-Proto $scheme;\n        proxy_set_header Upgrade $http_upgrade;\n        proxy_set_header Connection "upgrade";\n    }}\n{managed_end}'''

if managed_start in text and managed_end in text:
    before = text.split(managed_start)[0]
    after = text.split(managed_end, 1)[1]
    text = before + block + after
else:
    insert_at = text.rfind('\n}')
    if insert_at == -1:
        raise SystemExit('Could not find closing brace in nginx config')
    text = text[:insert_at] + '\n' + block + '\n' + text[insert_at:]

conf.write_text(text)
PY

            nginx -t
            nginx -s reload

            echo "Nginx config updated safely. Backup: $BACKUP"
            echo "=== Public HTTP check ==="
            curl -I --max-time 20 https://www.flowtixtools.com/ || true
EOSSH
