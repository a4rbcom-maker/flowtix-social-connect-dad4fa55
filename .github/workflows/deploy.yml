name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  APP_NAME: flowtixtools-web
  APP_PORT: 3000

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build project
        run: bun run build

      - name: Prepare SSR deploy bundle
        run: |
          set -euo pipefail

          SERVER_ENTRY="dist/server/server.js"
          [ -f "$SERVER_ENTRY" ] || { echo "::error::SSR entry missing: $SERVER_ENTRY"; find dist -maxdepth 3 -type f 2>/dev/null | head -n 120 || true; exit 1; }

          DEPLOYED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          SHORT_SHA="$(echo "${GITHUB_SHA}" | cut -c1-7)"

          rm -rf deploy
          mkdir -p deploy
          cp -r dist deploy/dist
          cp package.json deploy/package.json
          [ -f "bun.lockb" ] && cp bun.lockb deploy/bun.lockb
          [ -f "bun.lock" ] && cp bun.lock deploy/bun.lock
          [ -f "package-lock.json" ] && cp package-lock.json deploy/package-lock.json

          cat > deploy/deploy-version.json <<JSON
          {
            "sha": "${GITHUB_SHA}",
            "short_sha": "${SHORT_SHA}",
            "run_id": "${GITHUB_RUN_ID}",
            "repo": "${GITHUB_REPOSITORY}",
            "deployed_at": "${DEPLOYED_AT}",
            "mode": "ssr",
            "status": "ok"
          }
          JSON

          echo "MODE=ssr" >> "$GITHUB_ENV"
          echo "SERVER_ENTRY=$SERVER_ENTRY" >> "$GITHUB_ENV"
          echo "DEPLOYED_AT=$DEPLOYED_AT" >> "$GITHUB_ENV"
          echo "SHORT_SHA=$SHORT_SHA" >> "$GITHUB_ENV"

          echo "=== SSR bundle ready ==="
          find deploy -maxdepth 3 -type f | head -n 160

      - name: Setup SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_IP: ${{ secrets.SERVER_IP }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          set -euo pipefail
          : "${SSH_PRIVATE_KEY:?Missing GitHub Secret: SSH_PRIVATE_KEY}"
          SERVER_HOST="${SERVER_IP:-${SSH_HOST:-}}"
          : "${SERVER_HOST:?Missing GitHub Secret: SERVER_IP or SSH_HOST}"
          SSH_PORT="${SSH_PORT:-22}"
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SSH_PORT" -H "$SERVER_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Resolve deploy path
        env:
          DEPLOY_PATH_SECRET: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -euo pipefail
          DEPLOY_PATH="${DEPLOY_PATH_SECRET:-/www/wwwroot/flowtixtools.com}"
          case "$DEPLOY_PATH" in
            /www/wwwroot/*flowtix*) : ;;
            *) echo "::error::Refusing to deploy outside Flowtix path: $DEPLOY_PATH"; exit 1 ;;
          esac
          BACKUPS_DIR="$(dirname "$DEPLOY_PATH")/flowtixtools-backups"
          echo "DEPLOY_PATH=$DEPLOY_PATH" >> "$GITHUB_ENV"
          echo "BACKUPS_DIR=$BACKUPS_DIR" >> "$GITHUB_ENV"
          echo "Deploy path: $DEPLOY_PATH"
          echo "Backups dir: $BACKUPS_DIR"

      - name: Snapshot current site
        env:
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SERVER_IP: ${{ secrets.SERVER_IP }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          set -euo pipefail
          DEPLOY_USER="${SERVER_USER:-${SSH_USER:-}}"
          SERVER_HOST="${SERVER_IP:-${SSH_HOST:-}}"
          SSH_PORT="${SSH_PORT:-22}"
          : "${DEPLOY_USER:?Missing GitHub Secret: SERVER_USER or SSH_USER}"
          : "${SERVER_HOST:?Missing GitHub Secret: SERVER_IP or SSH_HOST}"

          ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" -o StrictHostKeyChecking=no \
            "${DEPLOY_USER}@${SERVER_HOST}" \
            "DEPLOY_PATH='${DEPLOY_PATH}' BACKUPS_DIR='${BACKUPS_DIR}' bash -s" <<'EOSSH'
          set -euo pipefail
          mkdir -p "$BACKUPS_DIR"
          if [ ! -d "$DEPLOY_PATH" ] || [ -z "$(ls -A "$DEPLOY_PATH" 2>/dev/null || true)" ]; then
            echo "No existing site to snapshot — skipping."
            exit 0
          fi

          PREV_SHA="none"
          if [ -f "$DEPLOY_PATH/deploy-version.json" ]; then
            PREV_SHA=$(grep -o '"short_sha"[[:space:]]*:[[:space:]]*"[^"]*"' "$DEPLOY_PATH/deploy-version.json" | head -n1 | sed 's/.*"\([^"]*\)"$/\1/' || echo "none")
            [ -z "$PREV_SHA" ] && PREV_SHA="none"
          fi
          SNAP="$BACKUPS_DIR/$(date -u +%Y%m%d%H%M%S)-${PREV_SHA}"
          echo "Creating snapshot: $SNAP"
          mkdir -p "$SNAP"
          rsync -a --delete \
            --exclude='node_modules/' \
            --exclude='.env' \
            --exclude='.user.ini' \
            --exclude='.htaccess' \
            --exclude='.well-known/' \
            "$DEPLOY_PATH/" "$SNAP/"
          echo "$SNAP" > "$BACKUPS_DIR/PREV_SNAPSHOT"
          ls -1dt "$BACKUPS_DIR"/[0-9]* 2>/dev/null | tail -n +6 | xargs -r rm -rf
          EOSSH

      - name: Deploy bundle via rsync
        env:
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SERVER_IP: ${{ secrets.SERVER_IP }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          set -euo pipefail
          DEPLOY_USER="${SERVER_USER:-${SSH_USER:-}}"
          SERVER_HOST="${SERVER_IP:-${SSH_HOST:-}}"
          SSH_PORT="${SSH_PORT:-22}"
          : "${DEPLOY_USER:?Missing GitHub Secret: SERVER_USER or SSH_USER}"
          : "${SERVER_HOST:?Missing GitHub Secret: SERVER_IP or SSH_HOST}"

          ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" -o StrictHostKeyChecking=no \
            "${DEPLOY_USER}@${SERVER_HOST}" "mkdir -p '${DEPLOY_PATH}'"

          rsync -az --delete \
            --exclude='node_modules/' \
            --exclude='.env' \
            --exclude='.user.ini' \
            --exclude='.htaccess' \
            --exclude='.well-known/' \
            --exclude='*.log' \
            -e "ssh -i ~/.ssh/deploy_key -p $SSH_PORT -o StrictHostKeyChecking=no" \
            ./deploy/ \
            "${DEPLOY_USER}@${SERVER_HOST}:${DEPLOY_PATH}/"

      - name: Install dependencies and restart SSR app
        env:
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SERVER_IP: ${{ secrets.SERVER_IP }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          set -euo pipefail
          DEPLOY_USER="${SERVER_USER:-${SSH_USER:-}}"
          SERVER_HOST="${SERVER_IP:-${SSH_HOST:-}}"
          SSH_PORT="${SSH_PORT:-22}"
          : "${DEPLOY_USER:?Missing GitHub Secret: SERVER_USER or SSH_USER}"
          : "${SERVER_HOST:?Missing GitHub Secret: SERVER_IP or SSH_HOST}"

          ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" -o StrictHostKeyChecking=no \
            "${DEPLOY_USER}@${SERVER_HOST}" \
            "DEPLOY_PATH='${DEPLOY_PATH}' SERVER_ENTRY='${SERVER_ENTRY}' APP_NAME='${APP_NAME}' APP_PORT='${APP_PORT}' DEPLOY_SHA='${GITHUB_SHA}' DEPLOY_RUN_ID='${GITHUB_RUN_ID}' DEPLOY_REPOSITORY='${GITHUB_REPOSITORY}' DEPLOYED_AT='${DEPLOYED_AT}' bash -s" <<'EOSSH'
          set -euo pipefail
          cd "$DEPLOY_PATH"
          [ -f "$SERVER_ENTRY" ] || { echo "ERROR: SSR entry missing: $SERVER_ENTRY"; exit 1; }
          [ -f deploy-version.json ] || { echo "ERROR: deploy-version.json missing"; exit 1; }

          if command -v bun >/dev/null 2>&1; then
            bun install --production --frozen-lockfile || bun install --production
          elif [ -f package-lock.json ]; then
            npm ci --omit=dev
          else
            npm install --omit=dev
          fi

          command -v pm2 >/dev/null 2>&1 || { echo "ERROR: pm2 is not installed on the server"; exit 1; }
          command -v node >/dev/null 2>&1 || { echo "ERROR: node is not installed on the server"; exit 1; }
          [ -x node_modules/.bin/srvx ] || { echo "ERROR: srvx is not installed in production dependencies"; exit 1; }

          if pm2 describe "$APP_NAME" >/dev/null 2>&1; then
            pm2 delete "$APP_NAME" || true
          fi

          if [ -f .env ]; then
            while IFS= read -r line || [ -n "$line" ]; do
              case "$line" in ""|\#*) continue ;; esac
              key="${line%%=*}"
              value="${line#*=}"
              case "$key" in
                SUPABASE_URL|SUPABASE_PUBLISHABLE_KEY|SUPABASE_SERVICE_ROLE_KEY|VITE_SUPABASE_URL|VITE_SUPABASE_PUBLISHABLE_KEY|BOT_ENCRYPTION_KEY|BOT_WORKER_SECRET)
                  value="${value%\"}"; value="${value#\"}"
                  value="${value%\'}"; value="${value#\'}"
                  export "$key=$value"
                  ;;
              esac
            done < .env
          fi
          export SUPABASE_URL="${SUPABASE_URL:-${VITE_SUPABASE_URL:-}}"
          export SUPABASE_PUBLISHABLE_KEY="${SUPABASE_PUBLISHABLE_KEY:-${VITE_SUPABASE_PUBLISHABLE_KEY:-}}"

          NODE_ENV=production \
          DEPLOY_SHA="$DEPLOY_SHA" \
          DEPLOY_RUN_ID="$DEPLOY_RUN_ID" \
          DEPLOY_REPOSITORY="$DEPLOY_REPOSITORY" \
          DEPLOYED_AT="$DEPLOYED_AT" \
            pm2 start node_modules/.bin/srvx --name "$APP_NAME" --interpreter node --cwd "$DEPLOY_PATH" --update-env -- serve --entry "$SERVER_ENTRY" --static dist/client --prod --host 127.0.0.1 --port "$APP_PORT"
          pm2 save
          EOSSH

      - name: Verify SSR app locally on server
        env:
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SERVER_IP: ${{ secrets.SERVER_IP }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          set -euo pipefail
          DEPLOY_USER="${SERVER_USER:-${SSH_USER:-}}"
          SERVER_HOST="${SERVER_IP:-${SSH_HOST:-}}"
          SSH_PORT="${SSH_PORT:-22}"

          ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" -o StrictHostKeyChecking=no \
            "${DEPLOY_USER}@${SERVER_HOST}" \
            "APP_NAME='${APP_NAME}' APP_PORT='${APP_PORT}' SHORT_SHA='${SHORT_SHA}' bash -s" <<'EOSSH'
          set -euo pipefail
          for i in $(seq 1 30); do
            HOME_STATUS=$(curl -fsS --max-time 10 "http://127.0.0.1:${APP_PORT}/" >/dev/null && echo ok || echo fail)
            VERSION_BODY=$(curl -fsS --max-time 10 "http://127.0.0.1:${APP_PORT}/deploy-version.json" || true)
            echo "$VERSION_BODY"
            if [ "$HOME_STATUS" = "ok" ] && echo "$VERSION_BODY" | grep -q "$SHORT_SHA"; then
              echo "SSR app is healthy locally on port ${APP_PORT}"
              exit 0
            fi
            sleep 2
          done
          echo "ERROR: SSR app not responding correctly on 127.0.0.1:${APP_PORT}"
          pm2 describe "$APP_NAME" || true
          pm2 logs "$APP_NAME" --lines 160 --nostream || true
          exit 1
          EOSSH

      - name: Verify public domain shows this commit
        env:
          PUBLIC_URL_SECRET: ${{ secrets.PUBLIC_URL }}
        run: |
          set -euo pipefail
          if [ -n "${PUBLIC_URL_SECRET:-}" ]; then
            PUBLIC_URLS="${PUBLIC_URL_SECRET%/}"
          else
            PUBLIC_URLS="https://www.flowtixtools.com https://flowtixtools.com"
          fi

          for i in $(seq 1 24); do
            for PUBLIC_URL in $PUBLIC_URLS; do
              VERSION_URL="${PUBLIC_URL%/}/deploy-version.json"
              BODY=$(curl -fsS --max-time 20 "$VERSION_URL" || true)
              echo "$VERSION_URL"
              echo "$BODY"
              if echo "$BODY" | grep -q "$SHORT_SHA"; then
                echo "✅ Public domain serves commit ${SHORT_SHA} via ${PUBLIC_URL%/}"
                exit 0
              fi
            done
            sleep 5
          done

          echo "::error::Public domain did not serve commit ${SHORT_SHA}. The app passed local PM2 health checks, so check Nginx/domain proxy to http://127.0.0.1:${APP_PORT}."
          exit 1

      - name: Record LAST_GOOD snapshot
        env:
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SERVER_IP: ${{ secrets.SERVER_IP }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          set -euo pipefail
          DEPLOY_USER="${SERVER_USER:-${SSH_USER:-}}"
          SERVER_HOST="${SERVER_IP:-${SSH_HOST:-}}"
          SSH_PORT="${SSH_PORT:-22}"

          ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" -o StrictHostKeyChecking=no \
            "${DEPLOY_USER}@${SERVER_HOST}" \
            "DEPLOY_PATH='${DEPLOY_PATH}' BACKUPS_DIR='${BACKUPS_DIR}' SHORT_SHA='${SHORT_SHA}' bash -s" <<'EOSSH'
          set -euo pipefail
          mkdir -p "$BACKUPS_DIR"
          GOOD="$BACKUPS_DIR/good-$(date -u +%Y%m%d%H%M%S)-${SHORT_SHA}"
          mkdir -p "$GOOD"
          rsync -a --delete \
            --exclude='node_modules/' \
            --exclude='.env' \
            --exclude='.user.ini' \
            --exclude='.htaccess' \
            --exclude='.well-known/' \
            "$DEPLOY_PATH/" "$GOOD/"
          echo "$GOOD" > "$BACKUPS_DIR/LAST_GOOD"
          echo "Recorded LAST_GOOD -> $GOOD"
          ls -1dt "$BACKUPS_DIR"/good-* 2>/dev/null | tail -n +6 | xargs -r rm -rf
          EOSSH

      - name: Auto rollback on failure
        if: failure()
        env:
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SERVER_IP: ${{ secrets.SERVER_IP }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          PUBLIC_URL_SECRET: ${{ secrets.PUBLIC_URL }}
        run: |
          set -euo pipefail
          DEPLOY_USER="${SERVER_USER:-${SSH_USER:-}}"
          SERVER_HOST="${SERVER_IP:-${SSH_HOST:-}}"
          SSH_PORT="${SSH_PORT:-22}"
          if [ -n "${PUBLIC_URL_SECRET:-}" ]; then
            PUBLIC_URLS="${PUBLIC_URL_SECRET%/}"
          else
            PUBLIC_URLS="https://www.flowtixtools.com https://flowtixtools.com"
          fi

          if [ -z "${DEPLOY_PATH:-}" ] || [ -z "${BACKUPS_DIR:-}" ]; then
            echo "::warning::DEPLOY_PATH/BACKUPS_DIR not set — cannot rollback"
            exit 0
          fi

          echo "Deploy failed — attempting automatic rollback"

          ROLLBACK_INFO=$(ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" -o StrictHostKeyChecking=no \
            "${DEPLOY_USER}@${SERVER_HOST}" \
            "DEPLOY_PATH='${DEPLOY_PATH}' BACKUPS_DIR='${BACKUPS_DIR}' APP_NAME='${APP_NAME}' APP_PORT='${APP_PORT}' bash -s" <<'EOSSH'
          set -euo pipefail
          SRC=""
          if [ -f "$BACKUPS_DIR/LAST_GOOD" ]; then
            SRC=$(cat "$BACKUPS_DIR/LAST_GOOD")
          fi
          if [ -z "$SRC" ] || [ ! -d "$SRC" ]; then
            if [ -f "$BACKUPS_DIR/PREV_SNAPSHOT" ]; then
              SRC=$(cat "$BACKUPS_DIR/PREV_SNAPSHOT")
            fi
          fi
          if [ -z "$SRC" ] || [ ! -d "$SRC" ]; then
            echo "ROLLBACK_RESULT=none"
            exit 0
          fi

          rsync -a --delete \
            --exclude='node_modules/' \
            --exclude='.env' \
            --exclude='.user.ini' \
            --exclude='.htaccess' \
            --exclude='.well-known/' \
            "$SRC/" "$DEPLOY_PATH/"

          cd "$DEPLOY_PATH"
          ENTRY="dist/server/server.js"
          if [ ! -f "$ENTRY" ]; then
            ENTRY=""
            for c in .output/server/index.mjs .output/server/index.js scripts/tanstack-node-server.mjs; do
              if [ -f "$c" ]; then ENTRY="$c"; break; fi
            done
          fi
          [ -n "$ENTRY" ] && [ -f "$ENTRY" ] || { echo "ROLLBACK_RESULT=bad_snapshot"; exit 0; }

          RESTORED_SHA="unknown"
          RESTORED_SHORT="unknown"
          RESTORED_RUN=""
          RESTORED_REPO=""
          RESTORED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          if [ -f deploy-version.json ]; then
            RESTORED_SHA=$(grep -o '"sha"[[:space:]]*:[[:space:]]*"[^"]*"' deploy-version.json | head -n1 | sed 's/.*"\([^"]*\)"$/\1/' || echo unknown)
            RESTORED_SHORT=$(grep -o '"short_sha"[[:space:]]*:[[:space:]]*"[^"]*"' deploy-version.json | head -n1 | sed 's/.*"\([^"]*\)"$/\1/' || echo unknown)
            RESTORED_RUN=$(grep -o '"run_id"[[:space:]]*:[[:space:]]*"[^"]*"' deploy-version.json | head -n1 | sed 's/.*"\([^"]*\)"$/\1/' || true)
            RESTORED_REPO=$(grep -o '"repo"[[:space:]]*:[[:space:]]*"[^"]*"' deploy-version.json | head -n1 | sed 's/.*"\([^"]*\)"$/\1/' || true)
            RESTORED_AT=$(grep -o '"deployed_at"[[:space:]]*:[[:space:]]*"[^"]*"' deploy-version.json | head -n1 | sed 's/.*"\([^"]*\)"$/\1/' || echo "$RESTORED_AT")
          fi
          [ -z "$RESTORED_SHA" ] && RESTORED_SHA="$RESTORED_SHORT"

          if command -v bun >/dev/null 2>&1; then
            bun install --production --frozen-lockfile || bun install --production
          elif [ -f package-lock.json ]; then
            npm ci --omit=dev
          else
            npm install --omit=dev
          fi

          if pm2 describe "$APP_NAME" >/dev/null 2>&1; then
            pm2 delete "$APP_NAME" || true
          fi
          if [ -f .env ]; then
            while IFS= read -r line || [ -n "$line" ]; do
              case "$line" in ""|\#*) continue ;; esac
              key="${line%%=*}"
              value="${line#*=}"
              case "$key" in
                SUPABASE_URL|SUPABASE_PUBLISHABLE_KEY|SUPABASE_SERVICE_ROLE_KEY|VITE_SUPABASE_URL|VITE_SUPABASE_PUBLISHABLE_KEY|BOT_ENCRYPTION_KEY|BOT_WORKER_SECRET)
                  value="${value%\"}"; value="${value#\"}"
                  value="${value%\'}"; value="${value#\'}"
                  export "$key=$value"
                  ;;
              esac
            done < .env
          fi
          export SUPABASE_URL="${SUPABASE_URL:-${VITE_SUPABASE_URL:-}}"
          export SUPABASE_PUBLISHABLE_KEY="${SUPABASE_PUBLISHABLE_KEY:-${VITE_SUPABASE_PUBLISHABLE_KEY:-}}"
          export NODE_ENV=production
          export DEPLOY_SHA="$RESTORED_SHA"
          export DEPLOY_RUN_ID="$RESTORED_RUN"
          export DEPLOY_REPOSITORY="$RESTORED_REPO"
          export DEPLOYED_AT="$RESTORED_AT"
          if [ "$ENTRY" = "dist/server/server.js" ] && [ -x node_modules/.bin/srvx ]; then
            pm2 start node_modules/.bin/srvx --name "$APP_NAME" --interpreter node --cwd "$DEPLOY_PATH" --update-env -- serve --entry "$ENTRY" --static dist/client --prod --host 127.0.0.1 --port "$APP_PORT"
          else
            PORT="$APP_PORT" pm2 start "$ENTRY" --name "$APP_NAME" --interpreter node --cwd "$DEPLOY_PATH" --update-env
          fi
          pm2 save

          echo "ROLLBACK_RESULT=ok"
          echo "ROLLBACK_SRC=$SRC"
          echo "ROLLBACK_SHA=$RESTORED_SHA"
          echo "ROLLBACK_SHORT=$RESTORED_SHORT"
          EOSSH
          )

          echo "$ROLLBACK_INFO"

          if echo "$ROLLBACK_INFO" | grep -q "ROLLBACK_RESULT=none"; then
            echo "::warning::No previous snapshot found — site left as-is."
            exit 0
          fi
          if echo "$ROLLBACK_INFO" | grep -q "ROLLBACK_RESULT=bad_snapshot"; then
            echo "::error::Rollback snapshot does not contain SSR entry."
            exit 1
          fi

          RESTORED_SHORT=$(echo "$ROLLBACK_INFO" | grep '^ROLLBACK_SHORT=' | head -n1 | cut -d= -f2)
          echo "Rolled back to commit ${RESTORED_SHORT:-unknown}"

          if [ -n "${RESTORED_SHORT:-}" ] && [ "$RESTORED_SHORT" != "unknown" ]; then
            for i in $(seq 1 12); do
              for PUBLIC_URL in $PUBLIC_URLS; do
                BODY=$(curl -fsS --max-time 20 "${PUBLIC_URL%/}/deploy-version.json" || true)
                echo "$BODY"
                if echo "$BODY" | grep -q "$RESTORED_SHORT"; then
                  echo "✅ Public domain now serves rolled-back commit ${RESTORED_SHORT} via ${PUBLIC_URL%/}"
                  exit 0
                fi
              done
              sleep 5
            done
          fi
