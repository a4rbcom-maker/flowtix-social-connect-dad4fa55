name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build project
        run: bun run build

      # ──────────────────────────────────────────────────────────────────
      # Prepare a clean static ./deploy/ folder
      # ──────────────────────────────────────────────────────────────────
      - name: Prepare deploy bundle (static)
        run: |
          set -euo pipefail

          echo "=== Build output tree ==="
          for d in dist dist/client .output .output/public; do
            if [ -d "$d" ]; then
              echo "--- $d ---"
              ls -la "$d" | head -n 40
            fi
          done

          STATIC_SRC=""
          if [ -d "dist/client" ]; then
            STATIC_SRC="dist/client"
          elif [ -d ".output/public" ]; then
            STATIC_SRC=".output/public"
          fi

          if [ -z "$STATIC_SRC" ]; then
            echo "::error::No static build folder found (dist/client or .output/public)."
            exit 1
          fi

          rm -rf deploy
          mkdir -p deploy
          cp -r "$STATIC_SRC"/. deploy/

          # SPA shell fallback
          if [ ! -f "deploy/index.html" ]; then
            if [ -f "deploy/_shell/index.html" ]; then
              echo "Using _shell/index.html as SPA entry"
              cp deploy/_shell/index.html deploy/index.html
            else
              echo "::error::No index.html in built static output."
              find deploy -maxdepth 2 -type f | head -n 40 || true
              exit 1
            fi
          fi

          # Deploy version marker
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
          cat > deploy/deploy-version.json <<JSON
          {
            "sha": "${GITHUB_SHA}",
            "short_sha": "${SHORT_SHA}",
            "run_id": "${GITHUB_RUN_ID}",
            "repo": "${GITHUB_REPOSITORY}",
            "deployed_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "mode": "static"
          }
          JSON

          echo "=== ./deploy ready ==="
          ls -la deploy | head -n 30

      - name: Setup SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_IP: ${{ secrets.SERVER_IP }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          set -euo pipefail
          : "${SSH_PRIVATE_KEY:?Missing GitHub Secret: SSH_PRIVATE_KEY}"
          SERVER_HOST="${SERVER_IP:-${SSH_HOST:-}}"
          : "${SERVER_HOST:?Missing GitHub Secret: SERVER_IP or SSH_HOST}"
          SSH_PORT="${SSH_PORT:-22}"
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SSH_PORT" -H "$SERVER_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      # ──────────────────────────────────────────────────────────────────
      # Resolve DEPLOY_PATH from secret with safe default, no Nginx reads
      # ──────────────────────────────────────────────────────────────────
      - name: Resolve deploy path
        env:
          DEPLOY_PATH_SECRET: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -euo pipefail
          DEPLOY_PATH="${DEPLOY_PATH_SECRET:-/www/wwwroot/flowtixtools.com}"
          case "$DEPLOY_PATH" in
            /www/wwwroot/*flowtix*) : ;;
            *) echo "::error::Refusing to deploy outside Flowtix path: $DEPLOY_PATH"; exit 1 ;;
          esac
          echo "DEPLOY_PATH=$DEPLOY_PATH"
          echo "DEPLOY_PATH=$DEPLOY_PATH" >> "$GITHUB_ENV"

      # ──────────────────────────────────────────────────────────────────
      # Snapshot the current live site before overwriting (for rollback)
      # ──────────────────────────────────────────────────────────────────
      - name: Snapshot current site
        env:
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SERVER_IP: ${{ secrets.SERVER_IP }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          set -euo pipefail
          DEPLOY_USER="${SERVER_USER:-${SSH_USER:-}}"
          SERVER_HOST="${SERVER_IP:-${SSH_HOST:-}}"
          SSH_PORT="${SSH_PORT:-22}"

          ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" -o StrictHostKeyChecking=no \
            "${DEPLOY_USER}@${SERVER_HOST}" \
            "DEPLOY_PATH='${DEPLOY_PATH}' bash -s" <<'EOSSH'
          set -e
          BACKUPS_DIR="/www/backups/flowtixtools"
          mkdir -p "$BACKUPS_DIR"

          if [ ! -d "$DEPLOY_PATH" ] || [ -z "$(ls -A "$DEPLOY_PATH" 2>/dev/null || true)" ]; then
            echo "No existing site to snapshot — skipping."
            exit 0
          fi

          PREV_SHA="none"
          if [ -f "$DEPLOY_PATH/deploy-version.json" ]; then
            PREV_SHA=$(grep -o '"short_sha"[[:space:]]*:[[:space:]]*"[^"]*"' "$DEPLOY_PATH/deploy-version.json" | head -n1 | sed 's/.*"\([^"]*\)"$/\1/' || echo "none")
            [ -z "$PREV_SHA" ] && PREV_SHA="none"
          fi
          TS=$(date -u +%Y%m%d%H%M%S)
          SNAP="$BACKUPS_DIR/${TS}-${PREV_SHA}"
          echo "Creating snapshot: $SNAP"
          mkdir -p "$SNAP"
          rsync -a --delete \
            --exclude='.user.ini' \
            --exclude='.htaccess' \
            --exclude='.well-known/' \
            "$DEPLOY_PATH/" "$SNAP/"
          echo "$SNAP" > "$BACKUPS_DIR/PREV_SNAPSHOT"

          # Keep only the 5 most recent snapshots
          ls -1dt "$BACKUPS_DIR"/[0-9]* 2>/dev/null | tail -n +6 | xargs -r rm -rf
          echo "Snapshots retained:"
          ls -1dt "$BACKUPS_DIR"/[0-9]* 2>/dev/null || true
          EOSSH

      # ──────────────────────────────────────────────────────────────────
      # Rsync static bundle to web root (no Nginx/PM2 edits)
      # ──────────────────────────────────────────────────────────────────
      - name: Deploy bundle via rsync
        env:
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SERVER_IP: ${{ secrets.SERVER_IP }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          set -euo pipefail
          DEPLOY_USER="${SERVER_USER:-${SSH_USER:-}}"
          SERVER_HOST="${SERVER_IP:-${SSH_HOST:-}}"
          SSH_PORT="${SSH_PORT:-22}"

          case "$DEPLOY_PATH" in
            /www/wwwroot/*flowtix*) : ;;
            *) echo "::error::Refusing to deploy outside Flowtix path: $DEPLOY_PATH"; exit 1 ;;
          esac

          ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" -o StrictHostKeyChecking=no \
            "${DEPLOY_USER}@${SERVER_HOST}" "mkdir -p ${DEPLOY_PATH}"

          rsync -avz --delete \
            --exclude='.user.ini' \
            --exclude='.htaccess' \
            --exclude='.well-known/' \
            --exclude='*.log' \
            -e "ssh -i ~/.ssh/deploy_key -p $SSH_PORT -o StrictHostKeyChecking=no" \
            ./deploy/ \
            "${DEPLOY_USER}@${SERVER_HOST}:${DEPLOY_PATH}/"

      # ──────────────────────────────────────────────────────────────────
      # Verify files landed on server
      # ──────────────────────────────────────────────────────────────────
      - name: Verify files on server
        env:
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SERVER_IP: ${{ secrets.SERVER_IP }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          set -euo pipefail
          DEPLOY_USER="${SERVER_USER:-${SSH_USER:-}}"
          SERVER_HOST="${SERVER_IP:-${SSH_HOST:-}}"
          SSH_PORT="${SSH_PORT:-22}"

          ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" -o StrictHostKeyChecking=no \
            "${DEPLOY_USER}@${SERVER_HOST}" \
            "DEPLOY_PATH='${DEPLOY_PATH}' bash -s" <<'EOSSH'
          set -e
          cd "$DEPLOY_PATH"
          echo "=== Top of $DEPLOY_PATH ==="
          ls -la | head -n 40
          [ -f index.html ] || { echo "ERROR: index.html missing"; exit 1; }
          [ -f deploy-version.json ] || { echo "ERROR: deploy-version.json missing"; exit 1; }
          echo "=== deploy-version.json ==="
          cat deploy-version.json
          EOSSH

      # ──────────────────────────────────────────────────────────────────
      # Public verification — the domain must serve this commit
      # ──────────────────────────────────────────────────────────────────
      - name: Verify public site shows this commit
        id: verify_public
        run: |
          set -e
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
          URL_PRIMARY="https://www.flowtixtools.com/deploy-version.json"
          OK=0
          for i in $(seq 1 12); do
            BODY=$(curl -fsS --max-time 20 "$URL_PRIMARY" || true)
            echo "$BODY"
            if echo "$BODY" | grep -q "$SHORT_SHA"; then
              echo "✅ Public site serves commit ${SHORT_SHA}"
              OK=1
              break
            fi
            sleep 5
          done
          if [ "$OK" -ne 1 ]; then
            echo "::error::Public site did not update to commit ${SHORT_SHA} within timeout"
            exit 1
          fi

          echo "--- Homepage headers ---"
          curl -fsSI --max-time 20 https://www.flowtixtools.com/ | head -n 20 || true

      # ──────────────────────────────────────────────────────────────────
      # Record this deploy as LAST_GOOD (snapshot of what is now live)
      # ──────────────────────────────────────────────────────────────────
      - name: Record LAST_GOOD snapshot
        env:
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SERVER_IP: ${{ secrets.SERVER_IP }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          set -euo pipefail
          DEPLOY_USER="${SERVER_USER:-${SSH_USER:-}}"
          SERVER_HOST="${SERVER_IP:-${SSH_HOST:-}}"
          SSH_PORT="${SSH_PORT:-22}"
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)

          ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" -o StrictHostKeyChecking=no \
            "${DEPLOY_USER}@${SERVER_HOST}" \
            "DEPLOY_PATH='${DEPLOY_PATH}' SHORT_SHA='${SHORT_SHA}' bash -s" <<'EOSSH'
          set -e
          BACKUPS_DIR="/www/backups/flowtixtools"
          mkdir -p "$BACKUPS_DIR"
          TS=$(date -u +%Y%m%d%H%M%S)
          GOOD="$BACKUPS_DIR/good-${TS}-${SHORT_SHA}"
          rsync -a --delete \
            --exclude='.user.ini' \
            --exclude='.htaccess' \
            --exclude='.well-known/' \
            "$DEPLOY_PATH/" "$GOOD/"
          echo "$GOOD" > "$BACKUPS_DIR/LAST_GOOD"
          echo "Recorded LAST_GOOD -> $GOOD"
          ls -1dt "$BACKUPS_DIR"/good-* 2>/dev/null | tail -n +6 | xargs -r rm -rf
          EOSSH

      # ──────────────────────────────────────────────────────────────────
      # AUTO ROLLBACK on any failure above (snapshot/deploy/verify)
      # ──────────────────────────────────────────────────────────────────
      - name: Auto rollback on failure
        if: failure()
        env:
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SERVER_IP: ${{ secrets.SERVER_IP }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          set -euo pipefail
          DEPLOY_USER="${SERVER_USER:-${SSH_USER:-}}"
          SERVER_HOST="${SERVER_IP:-${SSH_HOST:-}}"
          SSH_PORT="${SSH_PORT:-22}"

          if [ -z "${DEPLOY_PATH:-}" ]; then
            echo "::warning::DEPLOY_PATH not set — cannot rollback"
            exit 0
          fi
          case "$DEPLOY_PATH" in
            /www/wwwroot/*flowtix*) : ;;
            *) echo "::error::Refusing to rollback outside Flowtix path: $DEPLOY_PATH"; exit 1 ;;
          esac

          echo "⚠️ Deploy failed — attempting automatic rollback to LAST_GOOD"

          ROLLBACK_INFO=$(ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" -o StrictHostKeyChecking=no \
            "${DEPLOY_USER}@${SERVER_HOST}" \
            "DEPLOY_PATH='${DEPLOY_PATH}' bash -s" <<'EOSSH'
          set -e
          BACKUPS_DIR="/www/backups/flowtixtools"
          SRC=""
          if [ -f "$BACKUPS_DIR/LAST_GOOD" ]; then
            SRC=$(cat "$BACKUPS_DIR/LAST_GOOD")
          fi
          if [ -z "$SRC" ] || [ ! -d "$SRC" ]; then
            # fallback to the snapshot we just took before this failed deploy
            if [ -f "$BACKUPS_DIR/PREV_SNAPSHOT" ]; then
              SRC=$(cat "$BACKUPS_DIR/PREV_SNAPSHOT")
            fi
          fi
          if [ -z "$SRC" ] || [ ! -d "$SRC" ]; then
            echo "ROLLBACK_RESULT=none"
            exit 0
          fi
          case "$DEPLOY_PATH" in
            /www/wwwroot/*flowtix*) : ;;
            *) echo "ROLLBACK_RESULT=refused"; exit 0 ;;
          esac
          rsync -a --delete \
            --exclude='.user.ini' \
            --exclude='.htaccess' \
            --exclude='.well-known/' \
            "$SRC/" "$DEPLOY_PATH/"
          RESTORED_SHA="unknown"
          if [ -f "$DEPLOY_PATH/deploy-version.json" ]; then
            RESTORED_SHA=$(grep -o '"short_sha"[[:space:]]*:[[:space:]]*"[^"]*"' "$DEPLOY_PATH/deploy-version.json" | head -n1 | sed 's/.*"\([^"]*\)"$/\1/')
          fi
          echo "ROLLBACK_RESULT=ok"
          echo "ROLLBACK_SRC=$SRC"
          echo "ROLLBACK_SHA=$RESTORED_SHA"
          EOSSH
          )

          echo "$ROLLBACK_INFO"

          if echo "$ROLLBACK_INFO" | grep -q "ROLLBACK_RESULT=none"; then
            echo "::warning::No previous snapshot found — site left as-is. (First deploy?)"
            exit 0
          fi
          if echo "$ROLLBACK_INFO" | grep -q "ROLLBACK_RESULT=refused"; then
            echo "::error::Rollback refused (path safety check)"
            exit 1
          fi

          RESTORED_SHA=$(echo "$ROLLBACK_INFO" | grep '^ROLLBACK_SHA=' | head -n1 | cut -d= -f2)
          echo "🔄 Rolled back to commit ${RESTORED_SHA:-unknown}"

          # Verify rollback served publicly
          if [ -n "${RESTORED_SHA:-}" ] && [ "$RESTORED_SHA" != "unknown" ]; then
            for i in $(seq 1 10); do
              BODY=$(curl -fsS --max-time 20 "https://www.flowtixtools.com/deploy-version.json" || true)
              if echo "$BODY" | grep -q "$RESTORED_SHA"; then
                echo "✅ Public site now serves rolled-back commit ${RESTORED_SHA}"
                break
              fi
              sleep 5
            done
          fi
