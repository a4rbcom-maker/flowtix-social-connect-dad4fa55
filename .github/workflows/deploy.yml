name: Deploy to VPS (manual)

# Keep Git sync independent from VPS deploy health.
# Deploy runs only when explicitly triggered from GitHub Actions.
on:
  workflow_dispatch:

# Global per-repo lock: at most one deploy run touches the VPS at a time.
# cancel-in-progress: false → queue new runs instead of killing a deploy
# mid-rsync/PM2-restart. Combined with the on-server flock (see below),
# this prevents any duplicate or overlapping deploys.
concurrency:
  group: vps-deploy-${{ github.repository }}
  cancel-in-progress: false

env:
  APP_NAME: ${{ vars.APP_NAME || 'flowtixtools-web' }}
  APP_PORT: ${{ vars.APP_PORT || '3100' }}
  LEGACY_PM2_APPS: ${{ vars.LEGACY_PM2_APPS || 'flowtix flowtix-social-connect' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # ─── 1. Source & toolchain ──────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # ─── 2. Validate required secrets early (clear failure messages) ───
      - name: Preflight — validate required secrets
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SERVER_IP: ${{ secrets.SERVER_IP }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          set -eu
          ERR=0
          [ -n "${SSH_PRIVATE_KEY:-}" ] || { echo "::error::Missing secret SSH_PRIVATE_KEY"; ERR=1; }
          [ -n "${SERVER_USER:-}${SSH_USER:-}" ] || { echo "::error::Missing secret SERVER_USER or SSH_USER"; ERR=1; }
          [ -n "${SERVER_IP:-}${SSH_HOST:-}" ] || { echo "::error::Missing secret SERVER_IP or SSH_HOST"; ERR=1; }
          [ "$ERR" -eq 0 ] || exit 1
          echo "✓ Required secrets present"

      - name: Preflight — validate deploy scripts
        run: |
          set -eu
          bash -n scripts/ci/install-restart.sh
          node --check scripts/tanstack-node-server.mjs
          node - <<'NODE'
          const config = require('./ecosystem.config.cjs');
          const app = config?.apps?.[0] || {};
          const failures = [];
          if (app.pmx !== false) failures.push('pmx must be false');
          if (app.automation !== false) failures.push('automation must be false');
          if (app.disable_trace !== true) failures.push('disable_trace must be true');
          if (app.trace === true) failures.push('trace must not be true');
          if (failures.length) {
            console.error(`PM2 APM/tracing guard failed: ${failures.join('; ')}`);
            process.exit(1);
          }
          console.log('✓ Deploy scripts and PM2 tracing guard are valid');
          NODE

      # ─── 3. Build ──────────────────────────────────────────────────────
      - name: Install dependencies (frozen lockfile)
        run: bun install --frozen-lockfile

      - name: Build project
        run: bun run build

      - name: Reinstall production-only deps for shipping
        run: |
          set -eu
          rm -rf node_modules
          bun install --production --frozen-lockfile

      # ─── 4. Prepare deploy bundle ──────────────────────────────────────
      - name: Prepare SSR deploy bundle
        run: |
          set -eu
          SERVER_ENTRY=""
          for c in dist/server/server.js dist/server/server.mjs dist/server/index.js dist/server/index.mjs; do
            [ -f "$c" ] && { SERVER_ENTRY="$c"; break; }
          done
          if [ -z "$SERVER_ENTRY" ]; then
            echo "::error::SSR entry missing. Expected one of: dist/server/server.js, dist/server/server.mjs, dist/server/index.js, dist/server/index.mjs"
            echo "Build output snapshot:"
            find dist -maxdepth 3 -type f | LC_ALL=C sort | sed -n '1,120p' || true
            exit 1
          fi

          DEPLOYED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          SHORT_SHA="$(echo "$GITHUB_SHA" | cut -c1-7)"

          rm -rf deploy && mkdir -p deploy
          cp -r dist deploy/dist
          cp -r scripts deploy/scripts
          cp -r node_modules deploy/node_modules
          cp package.json deploy/package.json
          cp ecosystem.config.cjs deploy/ecosystem.config.cjs

          cat > deploy/deploy-version.json <<JSON
          {
            "sha": "${GITHUB_SHA}",
            "short_sha": "${SHORT_SHA}",
            "run_id": "${GITHUB_RUN_ID}",
            "repo": "${GITHUB_REPOSITORY}",
            "deployed_at": "${DEPLOYED_AT}",
            "mode": "ssr",
            "status": "ok"
          }
          JSON

          # Simple manifest + checksums for on-server integrity check.
          (
            cd deploy
            TOTAL_FILES=$(find . -type f ! -name 'manifest.json' ! -name '*.log' | wc -l | tr -d ' ')
            {
              printf '{\n  "sha":"%s",\n  "total_files":%s,\n  "files":[\n' "$GITHUB_SHA" "$TOTAL_FILES"
              find . -type f ! -name 'manifest.json' ! -name '*.log' -printf '%P\n' | LC_ALL=C sort | \
                awk 'BEGIN{f=1}{if(!f)printf",\n";f=0;printf"    {\"path\":\"%s\"}",$0}'
              printf '\n  ]\n}\n'
            } > manifest.json
            find . -type f ! -name 'manifest.json' ! -name 'SHA256SUMS' ! -name '*.log' -print0 \
              | LC_ALL=C sort -z | xargs -0 sha256sum > SHA256SUMS
          )

          {
            echo "SERVER_ENTRY=$SERVER_ENTRY"
            echo "DEPLOYED_AT=$DEPLOYED_AT"
            echo "SHORT_SHA=$SHORT_SHA"
          } >> "$GITHUB_ENV"
          echo "✓ Bundle ready: $(find deploy -type f | wc -l) files, $(du -sh deploy | cut -f1)"

      # ─── 5. SSH setup ──────────────────────────────────────────────────
      - name: Setup SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_IP: ${{ secrets.SERVER_IP }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          set -eu
          HOST="${SERVER_IP:-${SSH_HOST:-}}"
          PORT="${SSH_PORT:-22}"
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$PORT" -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Resolve deploy path
        env:
          DEPLOY_PATH_SECRET: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_PATH_VAR: ${{ vars.DEPLOY_PATH }}
        run: |
          set -eu
          DP="${DEPLOY_PATH_SECRET:-${DEPLOY_PATH_VAR:-/www/wwwroot/flowtixtools.com}}"
          case "$DP" in
            /www/wwwroot/*) : ;;
            *) echo "::error::DEPLOY_PATH must be under /www/wwwroot — got: $DP"; exit 1 ;;
          esac
          echo "DEPLOY_PATH=$DP" >> "$GITHUB_ENV"
          echo "BACKUPS_DIR=$(dirname "$DP")/$(basename "$DP")-backups" >> "$GITHUB_ENV"

      # ─── 6. Server-side lock + SHA dedupe (real lock, no GH cache) ─────
      # flock holds an exclusive file lock per DEPLOY_PATH on the VPS.
      # The SHA marker prevents redeploying the same commit. Together they
      # make duplicate triggers safe even if GH concurrency lets two runs through.
      - name: Acquire server lock & check SHA marker
        id: lock
        env:
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SERVER_IP: ${{ secrets.SERVER_IP }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          FORCE: ${{ github.event_name == 'workflow_dispatch' && '1' || '0' }}
        run: |
          set -eu
          USER="${SERVER_USER:-${SSH_USER:-}}"
          HOST="${SERVER_IP:-${SSH_HOST:-}}"
          PORT="${SSH_PORT:-22}"

          RESULT=$(ssh -i ~/.ssh/deploy_key -p "$PORT" -o StrictHostKeyChecking=no \
            "${USER}@${HOST}" \
            "DEPLOY_PATH='${DEPLOY_PATH}' GITHUB_SHA='${GITHUB_SHA}' FORCE='${FORCE}' bash -s" <<'EOSSH'
          set -eu
          LOCK_DIR="${DEPLOY_PATH}/.deploy"
          mkdir -p "$LOCK_DIR"
          LOCK="${LOCK_DIR}/deploy.lock"
          MARKER="${LOCK_DIR}/last-sha"

          # Wait up to 10 minutes for any other in-flight deploy to release.
          exec 9>"$LOCK"
          if ! flock -w 600 9; then
            echo "RESULT=lock_timeout"
            exit 0
          fi

          # If this exact SHA was already deployed successfully, skip.
          if [ "$FORCE" != "1" ] && [ -f "$MARKER" ] && [ "$(cat "$MARKER")" = "$GITHUB_SHA" ]; then
            echo "RESULT=already_deployed"
            exit 0
          fi
          echo "RESULT=acquired"
          EOSSH
          )
          echo "$RESULT"
          STATUS=$(echo "$RESULT" | grep '^RESULT=' | tail -n1 | cut -d= -f2)

          case "$STATUS" in
            acquired)
              echo "skip=false" >> "$GITHUB_OUTPUT"
              echo "✓ Server lock acquired, SHA not yet deployed."
              ;;
            already_deployed)
              echo "skip=true" >> "$GITHUB_OUTPUT"
              echo "::notice::This commit was already deployed to the VPS — skipping."
              ;;
            lock_timeout)
              echo "::error::Could not acquire server deploy lock within 10 minutes (another deploy is running). Re-run later."
              exit 1
              ;;
            *)
              echo "::error::Unexpected lock result: $STATUS"
              exit 1
              ;;
          esac

      # ─── 7. Snapshot current site (for rollback) ───────────────────────
      - name: Snapshot current site
        if: steps.lock.outputs.skip != 'true'
        env:
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SERVER_IP: ${{ secrets.SERVER_IP }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          set -eu
          USER="${SERVER_USER:-${SSH_USER:-}}"
          HOST="${SERVER_IP:-${SSH_HOST:-}}"
          PORT="${SSH_PORT:-22}"
          ssh -i ~/.ssh/deploy_key -p "$PORT" -o StrictHostKeyChecking=no \
            "${USER}@${HOST}" \
            "DEPLOY_PATH='${DEPLOY_PATH}' BACKUPS_DIR='${BACKUPS_DIR}' bash -s" <<'EOSSH'
          set -eu
          mkdir -p "$BACKUPS_DIR"
          if [ ! -d "$DEPLOY_PATH" ] || [ -z "$(ls -A "$DEPLOY_PATH" 2>/dev/null || true)" ]; then
            echo "No existing site to snapshot — skipping."
            exit 0
          fi
          PREV_SHA="none"
          if [ -f "$DEPLOY_PATH/deploy-version.json" ]; then
            PREV_SHA=$(grep -o '"short_sha"[[:space:]]*:[[:space:]]*"[^"]*"' "$DEPLOY_PATH/deploy-version.json" \
              | head -n1 | sed 's/.*"\([^"]*\)"$/\1/' || echo "none")
            [ -z "$PREV_SHA" ] && PREV_SHA="none"
          fi
          SNAP="$BACKUPS_DIR/$(date -u +%Y%m%d%H%M%S)-${PREV_SHA}"
          mkdir -p "$SNAP"
          rsync -a --delete \
            --exclude='.env' --exclude='.user.ini' --exclude='.htaccess' \
            --exclude='var/' --exclude='.well-known/' --exclude='.deploy/' --exclude='vps-worker/' \
            "$DEPLOY_PATH/" "$SNAP/"
          echo "$SNAP" > "$BACKUPS_DIR/PREV_SNAPSHOT"
          ls -1dt "$BACKUPS_DIR"/[0-9]* 2>/dev/null | tail -n +6 | xargs -r rm -rf
          echo "✓ Snapshot: $SNAP"
          EOSSH

      # ─── 8. Ship bundle ────────────────────────────────────────────────
      - name: Deploy bundle via rsync
        if: steps.lock.outputs.skip != 'true'
        env:
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SERVER_IP: ${{ secrets.SERVER_IP }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          set -eu
          USER="${SERVER_USER:-${SSH_USER:-}}"
          HOST="${SERVER_IP:-${SSH_HOST:-}}"
          PORT="${SSH_PORT:-22}"
          REMOTE_STAGING=".flowtixtools-web-staging/${GITHUB_RUN_ID}"
          ssh -i ~/.ssh/deploy_key -p "$PORT" -o StrictHostKeyChecking=no \
            "${USER}@${HOST}" "rm -rf '${REMOTE_STAGING}' && mkdir -p '${REMOTE_STAGING}'"
          rsync -az --delete \
            --exclude='.env' --exclude='.user.ini' --exclude='.htaccess' \
            --exclude='.well-known/' --exclude='var/' --exclude='*.log' \
            --exclude='.deploy/' --exclude='vps-worker/' \
            -e "ssh -i ~/.ssh/deploy_key -p $PORT -o StrictHostKeyChecking=no" \
            ./deploy/ "${USER}@${HOST}:${REMOTE_STAGING}/"
          echo "REMOTE_STAGING=$REMOTE_STAGING" >> "$GITHUB_ENV"
          echo "✓ rsync to safe staging complete"

      # ─── 9. Install & restart on server (delegates to script) ──────────
      - name: Install & restart SSR app on server
        if: steps.lock.outputs.skip != 'true'
        env:
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SERVER_IP: ${{ secrets.SERVER_IP }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          DEBUG_INSTALL: ${{ vars.DEBUG_INSTALL || '1' }}
        run: |
          set -eu
          USER="${SERVER_USER:-${SSH_USER:-}}"
          HOST="${SERVER_IP:-${SSH_HOST:-}}"
          PORT="${SSH_PORT:-22}"

          REMOTE_SCRIPT="/tmp/install-restart-${GITHUB_RUN_ID}.sh"
          scp -i ~/.ssh/deploy_key -P "$PORT" -o StrictHostKeyChecking=no \
            scripts/ci/install-restart.sh \
            "${USER}@${HOST}:${REMOTE_SCRIPT}"

          set +e
          ssh -i ~/.ssh/deploy_key -p "$PORT" -o StrictHostKeyChecking=no \
            "${USER}@${HOST}" \
            "DEPLOY_PATH='${DEPLOY_PATH}' BACKUPS_DIR='${BACKUPS_DIR}' STAGING_PATH='${REMOTE_STAGING}' SERVER_ENTRY='${SERVER_ENTRY}' APP_NAME='${APP_NAME}' APP_PORT='${APP_PORT}' LEGACY_PM2_APPS='${LEGACY_PM2_APPS}' DEPLOY_SHA='${GITHUB_SHA}' DEPLOY_RUN_ID='${GITHUB_RUN_ID}' DEPLOY_REPOSITORY='${GITHUB_REPOSITORY}' DEPLOYED_AT='${DEPLOYED_AT}' DEBUG_INSTALL='${DEBUG_INSTALL}' bash '${REMOTE_SCRIPT}'" \
            2>&1 | tee install-restart.log
          SSH_EXIT=${PIPESTATUS[0]}
          set -e
          if [ "$SSH_EXIT" -ne 0 ]; then
            echo "::group::Install/restart failure log tail"
            tail -n 220 install-restart.log || true
            echo "::endgroup::"
            REASON=$(grep -E '^DEPLOY_FAILURE_REASON=' install-restart.log | tail -n1 | cut -d= -f2- || true)
            if [ -n "$REASON" ]; then
              echo "::error::Install/restart step failed on server (exit $SSH_EXIT) — reason: $REASON"
            else
              echo "::error::Install/restart step failed on server (exit $SSH_EXIT) — no DEPLOY_FAILURE_REASON was emitted; see diagnostic dump above."
            fi
            exit "$SSH_EXIT"
          fi

      # ─── 10. Local health check on the VPS itself ──────────────────────
      - name: Verify SSR app on 127.0.0.1
        if: steps.lock.outputs.skip != 'true'
        env:
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SERVER_IP: ${{ secrets.SERVER_IP }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          set -eu
          USER="${SERVER_USER:-${SSH_USER:-}}"
          HOST="${SERVER_IP:-${SSH_HOST:-}}"
          PORT="${SSH_PORT:-22}"
          ssh -i ~/.ssh/deploy_key -p "$PORT" -o StrictHostKeyChecking=no \
            "${USER}@${HOST}" \
            "APP_NAME='${APP_NAME}' APP_PORT='${APP_PORT}' SHORT_SHA='${SHORT_SHA}' bash -s" <<'EOSSH'
          set -eu
          # Success criteria: the lightweight native endpoints (served BEFORE SSR
          # by tanstack-node-server.mjs) must respond and report the new SHA.
          # Home page "/" returning 500 is logged as a warning but does NOT fail
          # the deploy — that lets us ship SSR fixes even when the previous
          # build's home is broken. Public-domain check + app behavior covers
          # the rest in later steps.
          for i in $(seq 1 30); do
            VERSION_BODY=$(curl -fsS --max-time 10 "http://127.0.0.1:${APP_PORT}/deploy-version.json" || true)
            HEALTH_BODY=$(curl -fsS --max-time 10 "http://127.0.0.1:${APP_PORT}/api/public/health" || true)
            VERSION_OK=$(echo "$VERSION_BODY" | grep -q "$SHORT_SHA" && echo 1 || echo 0)
            HEALTH_OK=$(echo "$HEALTH_BODY" | grep -q '"status"[[:space:]]*:[[:space:]]*"ok"' && echo "$HEALTH_BODY" | grep -q "$SHORT_SHA" && echo 1 || echo 0)
            if [ "$VERSION_OK" = "1" ] && [ "$HEALTH_OK" = "1" ]; then
              HOME_CODE=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 "http://127.0.0.1:${APP_PORT}/" || echo 000)
              if [ "$HOME_CODE" = "200" ]; then
                echo "✓ SSR healthy on 127.0.0.1:${APP_PORT} serving ${SHORT_SHA} (home=200)"
              else
                echo "::warning::Home page returned HTTP ${HOME_CODE} but native health + deploy-version both report ${SHORT_SHA}. Marking deploy successful so SSR fixes can ship; investigate SSR render separately."
              fi
              exit 0
            fi
            sleep 2
          done
          echo "::error::Native health/version endpoints did not report ${SHORT_SHA} on 127.0.0.1:${APP_PORT}"
          pm2 describe "$APP_NAME" || true
          pm2 logs "$APP_NAME" --lines 120 --nostream || true
          exit 1
          EOSSH

      # ─── 11. Mark SHA as deployed (release the dedupe marker) ──────────
      - name: Verify public domain is serving this build
        if: steps.lock.outputs.skip != 'true'
        env:
          PUBLIC_URL: ${{ vars.PUBLIC_URL || secrets.PUBLIC_URL || 'https://flowtixtools.com' }}
          STRICT_PUBLIC_DOMAIN_CHECK: ${{ vars.STRICT_PUBLIC_DOMAIN_CHECK || 'false' }}
        run: |
          set -eu
          URL="${PUBLIC_URL%/}"
          [ -n "$URL" ] || { echo "No PUBLIC_URL configured — skipping public domain check."; exit 0; }

          echo "Checking public domain: $URL"
          SUCCESS_STREAK=0
          SEEN_SUCCESS=0
          for i in $(seq 1 20); do
            TS="$(date +%s)-${GITHUB_RUN_ID:-manual}-$i"
            HEALTH_BODY=$(curl -fsSL --max-time 20 \
              -H 'Cache-Control: no-cache, no-store, max-age=0' \
              -H 'Pragma: no-cache' \
              "$URL/api/public/health?ts=$TS" || true)
            VERSION_BODY=$(curl -fsSL --max-time 20 \
              -H 'Cache-Control: no-cache, no-store, max-age=0' \
              -H 'Pragma: no-cache' \
              "$URL/deploy-version.json?ts=$TS" || true)

            HEALTH_OK=$(printf '%s' "$HEALTH_BODY" | grep -q '"short_sha"[[:space:]]*:[[:space:]]*"'"$SHORT_SHA"'"' && echo 1 || echo 0)
            VERSION_OK=$(printf '%s' "$VERSION_BODY" | grep -q '"short_sha"[[:space:]]*:[[:space:]]*"'"$SHORT_SHA"'"' && echo 1 || echo 0)

            if [ "$HEALTH_OK" = "1" ] && [ "$VERSION_OK" = "1" ]; then
              SEEN_SUCCESS=1
              SUCCESS_STREAK=$((SUCCESS_STREAK + 1))
              echo "  attempt $i/20: ok (${SUCCESS_STREAK} consecutive) — public domain serves ${SHORT_SHA}"
              if [ "$SUCCESS_STREAK" -ge 3 ]; then
                echo "✓ Public domain stabilized on ${SHORT_SHA}"
                exit 0
              fi
            else
              SUCCESS_STREAK=0
              echo "  attempt $i/20: stale/misrouted public response"
              echo "    health : ${HEALTH_BODY:-<empty>}" | cut -c1-500
              echo "    version: ${VERSION_BODY:-<empty>}" | cut -c1-500
            fi
            sleep 5
          done

          STRICT=$(printf '%s' "$STRICT_PUBLIC_DOMAIN_CHECK" | tr '[:upper:]' '[:lower:]')
          if [ "$STRICT" = "true" ]; then
            echo "::error::Public domain did not stabilize on ${SHORT_SHA}. Fix the domain/proxy/vhost/cache before marking this deploy successful."
            exit 1
          fi

          if [ "$SEEN_SUCCESS" = "1" ]; then
            echo "::warning::Public domain served ${SHORT_SHA} intermittently but did not stay stable for 3 consecutive checks. Deployment kept successful because local SSR health already passed."
          else
            echo "::warning::Public domain did not show ${SHORT_SHA} during CI. Deployment kept successful because local SSR health already passed. Check proxy/vhost/cache separately."
          fi

      - name: Mark SHA as deployed on server
        if: success() && steps.lock.outputs.skip != 'true'
        env:
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SERVER_IP: ${{ secrets.SERVER_IP }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          set -eu
          USER="${SERVER_USER:-${SSH_USER:-}}"
          HOST="${SERVER_IP:-${SSH_HOST:-}}"
          PORT="${SSH_PORT:-22}"
          ssh -i ~/.ssh/deploy_key -p "$PORT" -o StrictHostKeyChecking=no \
            "${USER}@${HOST}" \
            "DEPLOY_PATH='${DEPLOY_PATH}' BACKUPS_DIR='${BACKUPS_DIR}' GITHUB_SHA='${GITHUB_SHA}' SHORT_SHA='${SHORT_SHA}' bash -s" <<'EOSSH'
          set -u
          mkdir -p "${DEPLOY_PATH}/.deploy" "$BACKUPS_DIR"
          printf '%s' "$GITHUB_SHA" > "${DEPLOY_PATH}/.deploy/last-sha"

          is_valid_snapshot() {
            local d="$1"
            [ -d "$d" ] || return 1
            [ -f "$d/ecosystem.config.cjs" ] || return 1
            [ -d "$d/node_modules" ] || return 1
            [ -f "$d/scripts/tanstack-node-server.mjs" ] || return 1
            for c in dist/server/server.js dist/server/server.mjs dist/server/index.js dist/server/index.mjs; do
              [ -f "$d/$c" ] && return 0
            done
            return 1
          }

          SNAP="$BACKUPS_DIR/good-$(date -u +%Y%m%d%H%M%S)-${SHORT_SHA}"
          TMP="${SNAP}.tmp"
          rm -rf "$TMP" 2>/dev/null || true
          mkdir -p "$TMP" || { echo "::warning::Could not create trusted snapshot temp dir; deploy remains successful."; exit 0; }
          rsync -a --delete \
            --exclude='.env' --exclude='.user.ini' --exclude='.htaccess' \
            --exclude='var/' --exclude='.well-known/' --exclude='.deploy/' --exclude='vps-worker/' \
            "$DEPLOY_PATH/" "$TMP/" || { echo "::warning::Trusted snapshot rsync failed; deploy remains successful."; rm -rf "$TMP" 2>/dev/null || true; exit 0; }

          if ! is_valid_snapshot "$TMP"; then
            rm -rf "$TMP" 2>/dev/null || true
            echo "::warning::Trusted snapshot validation failed; deploy remains successful and rollback will use PREV_SNAPSHOT if available."
            exit 0
          fi

          if mv "$TMP" "$SNAP" && printf '%s' "$SNAP" > "$BACKUPS_DIR/LAST_GOOD"; then
            ls -1dt "$BACKUPS_DIR"/good-* 2>/dev/null | tail -n +6 | xargs -r rm -rf || true
            echo "✓ Trusted rollback snapshot recorded: $SNAP"
          else
            rm -rf "$TMP" "$SNAP" 2>/dev/null || true
            echo "::warning::Trusted snapshot finalize failed; deploy remains successful."
          fi
          EOSSH
          echo "✓ Marked ${GITHUB_SHA} as deployed."

      # ─── 12. Auto-rollback on failure (best-effort) ─────────────────────
      # The deployment failure should remain attributable to the original step.
      # Rollback tries to help restore service, but if no snapshot exists yet
      # it must not replace the real failure reason with rollback noise.
      - name: Auto-rollback on failure
        id: rollback
        if: failure() && steps.lock.outputs.skip != 'true'
        env:
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SERVER_IP: ${{ secrets.SERVER_IP }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          set -eu
          USER="${SERVER_USER:-${SSH_USER:-}}"
          HOST="${SERVER_IP:-${SSH_HOST:-}}"
          PORT="${SSH_PORT:-22}"
          [ -n "${DEPLOY_PATH:-}" ] || { echo "::warning::No DEPLOY_PATH — cannot rollback"; exit 0; }

          set +e
          ssh -i ~/.ssh/deploy_key -p "$PORT" -o StrictHostKeyChecking=no \
            "${USER}@${HOST}" \
            "DEPLOY_PATH='${DEPLOY_PATH}' BACKUPS_DIR='${BACKUPS_DIR}' APP_NAME='${APP_NAME}' APP_PORT='${APP_PORT}' FAILED_SHA='${GITHUB_SHA}' bash -s" <<'EOSSH' 2>&1 | tee rollback.log
          set -u

          echo "════════════════════════════════════════════════════════════════"
          echo "  AUTO-ROLLBACK — failed SHA: ${FAILED_SHA}"
          echo "════════════════════════════════════════════════════════════════"

          # Clear failure SHA marker so the same broken commit can be retried.
          rm -f "${DEPLOY_PATH}/.deploy/last-sha" 2>/dev/null || true

          [ -d "$BACKUPS_DIR" ] || { echo "::error::Backups dir missing: $BACKUPS_DIR"; echo "ROLLBACK_RESULT=no_backups"; exit 1; }

          # Validate a snapshot has the minimum runtime files.
          is_valid() {
            local d="$1"
            [ -d "$d" ] || return 1
            [ -f "$d/ecosystem.config.cjs" ] || return 1
            [ -d "$d/node_modules" ] || return 1
            # SSR entry: any of the known names
            for c in dist/server/server.js dist/server/server.mjs dist/server/index.js dist/server/index.mjs; do
              [ -f "$d/$c" ] && return 0
            done
            return 1
          }

          snapshot_matches_failed_sha() {
            local d="$1"
            [ -f "$d/deploy-version.json" ] || return 1
            local deployed_sha deployed_short failed_short
            deployed_sha=$(sed -n 's/.*"sha"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' "$d/deploy-version.json" | head -n1)
            deployed_short=$(sed -n 's/.*"short_sha"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' "$d/deploy-version.json" | head -n1)
            failed_short="${FAILED_SHA:0:7}"
            [ "$deployed_sha" = "$FAILED_SHA" ] || { [ -n "$failed_short" ] && [ "$deployed_short" = "$failed_short" ]; }
          }

          same_sha_allowed_as_last_resort() {
            local kind="$1"
            case "$kind" in
              PREV_SNAPSHOT|raw) return 0 ;;
              *) return 1 ;;
            esac
          }

          # Build candidate list in priority order.
          CANDIDATES=()
          [ -f "$BACKUPS_DIR/LAST_GOOD" ] && CANDIDATES+=("LAST_GOOD:$(cat "$BACKUPS_DIR/LAST_GOOD" 2>/dev/null)")
          [ -f "$BACKUPS_DIR/PREV_SNAPSHOT" ] && CANDIDATES+=("PREV_SNAPSHOT:$(cat "$BACKUPS_DIR/PREV_SNAPSHOT" 2>/dev/null)")
          while IFS= read -r p; do [ -n "$p" ] && CANDIDATES+=("good-*:$p"); done < <(ls -1dt "$BACKUPS_DIR"/good-* 2>/dev/null | head -5)
          while IFS= read -r p; do [ -n "$p" ] && CANDIDATES+=("raw:$p"); done < <(ls -1dt "$BACKUPS_DIR"/[0-9]* 2>/dev/null | head -5)

          [ "${#CANDIDATES[@]}" -gt 0 ] || { echo "::error::No snapshots available in $BACKUPS_DIR"; echo "ROLLBACK_RESULT=no_snapshots"; exit 1; }

          echo "Candidates considered (priority order):"
          for c in "${CANDIDATES[@]}"; do echo "  • $c"; done
          echo ""

          PICKED=""; KIND=""
          for entry in "${CANDIDATES[@]}"; do
            kind="${entry%%:*}"; path="${entry#*:}"
            if snapshot_matches_failed_sha "$path"; then
              echo "  ✗ rejected failed SHA ($kind): $path"
            elif is_valid "$path"; then
              PICKED="$path"; KIND="$kind"
              echo "→ Selected ($kind): $PICKED"
              break
            else
              echo "  ✗ invalid ($kind): $path"
            fi
          done
          if [ -z "$PICKED" ]; then
            echo ""
            echo "No alternate SHA snapshot was usable; retrying with last-resort candidates captured before this failed deploy."
            for entry in "${CANDIDATES[@]}"; do
              kind="${entry%%:*}"; path="${entry#*:}"
              if ! same_sha_allowed_as_last_resort "$kind"; then
                continue
              fi
              if is_valid "$path"; then
                PICKED="$path"; KIND="$kind"
                echo "→ Last-resort selection ($kind, same SHA allowed): $PICKED"
                break
              else
                echo "  ✗ invalid last-resort ($kind): $path"
              fi
            done
          fi
          [ -n "$PICKED" ] || { echo "::warning::No valid snapshot found; rollback could not help, original deployment failure remains the root cause."; echo "ROLLBACK_RESULT=no_valid_snapshot"; exit 1; }

          echo ""
          echo "── Restoring $PICKED → $DEPLOY_PATH ──"
          rsync -a --delete \
            --exclude='.env' --exclude='.user.ini' --exclude='.htaccess' \
            --exclude='var/' --exclude='.well-known/' --exclude='.deploy/' --exclude='vps-worker/' \
            "$PICKED/" "$DEPLOY_PATH/" || { echo "::error::rsync from snapshot failed"; echo "ROLLBACK_RESULT=rsync_failed"; exit 1; }

          cd "$DEPLOY_PATH"
          if command -v pm2 >/dev/null 2>&1; then
            pm2 reload ecosystem.config.cjs --only "$APP_NAME" --update-env \
              || pm2 start ecosystem.config.cjs --only "$APP_NAME" --update-env \
              || { echo "::error::PM2 failed to start restored snapshot"; echo "ROLLBACK_RESULT=pm2_failed"; exit 1; }
            pm2 save || echo "::warning::pm2 save failed (non-fatal)"
          else
            echo "::error::pm2 not installed on server"; echo "ROLLBACK_RESULT=no_pm2"; exit 1
          fi

          echo ""
          echo "── Local health check on 127.0.0.1:${APP_PORT} ──"
          OK=0
          for i in $(seq 1 30); do
            if curl -fsS --max-time 8 "http://127.0.0.1:${APP_PORT}/" >/dev/null 2>&1; then
              echo "  ✓ healthy after ${i} attempt(s)"
              OK=1; break
            fi
            sleep 2
          done

          if [ "$OK" != "1" ]; then
            echo "::error::Restored snapshot ($KIND: $PICKED) failed health check"
            pm2 logs "$APP_NAME" --lines 60 --nostream 2>&1 || true
            echo "ROLLBACK_RESULT=health_failed"
            echo "ROLLBACK_KIND=$KIND"
            echo "ROLLBACK_SRC=$PICKED"
            exit 1
          fi

          RESTORED_SHA="unknown"
          [ -f "$DEPLOY_PATH/deploy-version.json" ] && \
            RESTORED_SHA=$(grep -o '"short_sha"[[:space:]]*:[[:space:]]*"[^"]*"' "$DEPLOY_PATH/deploy-version.json" | head -n1 | sed 's/.*"\([^"]*\)"$/\1/' || echo unknown)

          echo ""
          echo "════════════════════════════════════════════════════════════════"
          echo "  ✓ AUTO-ROLLBACK SUCCESS"
          echo "    restored kind : $KIND"
          echo "    restored from : $PICKED"
          echo "    serving SHA   : $RESTORED_SHA"
          echo "════════════════════════════════════════════════════════════════"
          echo "ROLLBACK_RESULT=restored"
          echo "ROLLBACK_KIND=$KIND"
          echo "ROLLBACK_SRC=$PICKED"
          echo "ROLLBACK_SHA=$RESTORED_SHA"
          EOSSH
          SSH_EXIT=${PIPESTATUS[0]}
          set -e

          RESULT=$(grep -E '^ROLLBACK_RESULT=' rollback.log | tail -n1 | cut -d= -f2 || echo unknown)
          KIND=$(grep -E '^ROLLBACK_KIND=' rollback.log | tail -n1 | cut -d= -f2 || echo "")
          SRC=$(grep -E '^ROLLBACK_SRC=' rollback.log | tail -n1 | cut -d= -f2 || echo "")
          SHA=$(grep -E '^ROLLBACK_SHA=' rollback.log | tail -n1 | cut -d= -f2 || echo "")
          echo "result=$RESULT" >> "$GITHUB_OUTPUT"

          {
            echo "## 🔁 Auto-Rollback Report"
            echo ""
            echo "- **Failed SHA**: \`${GITHUB_SHA}\`"
            echo "- **Result**: \`${RESULT}\`"
            [ -n "$KIND" ] && echo "- **Snapshot kind**: \`${KIND}\`"
            [ -n "$SRC" ] && echo "- **Restored from**: \`${SRC}\`"
            [ -n "$SHA" ] && echo "- **Now serving SHA**: \`${SHA}\`"
            echo ""
            if [ "$RESULT" = "restored" ]; then
              echo "✅ Site auto-restored to last good build. No manual action needed."
            else
              echo "❌ Auto-rollback could not restore the site. Manual intervention required."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$SSH_EXIT" -ne 0 ] || [ "$RESULT" != "restored" ]; then
            echo "::warning::Rollback did not complete automatically; preserving the original deployment failure as the workflow result."
            exit 0
          fi

      # ─── 13. Verify rollback via public domain ─────────────────────────
      # Only runs if step 12 actually restored a snapshot. Confirms the public
      # URL serves a working response (not necessarily the failed SHA).
      - name: Verify rollback via public domain
        if: failure() && steps.rollback.outputs.result == 'restored'
        env:
          PUBLIC_URL: ${{ vars.PUBLIC_URL || secrets.PUBLIC_URL || 'https://flowtixtools.com' }}
          STRICT_PUBLIC_DOMAIN_CHECK: ${{ vars.STRICT_PUBLIC_DOMAIN_CHECK || 'false' }}
        run: |
          set -eu
          URL="${PUBLIC_URL%/}"
          [ -n "$URL" ] || { echo "No PUBLIC_URL — skipping public verify."; exit 0; }
          echo "Verifying restored site at $URL …"
          for i in $(seq 1 15); do
            CODE=$(curl -fsSL -o /dev/null -w '%{http_code}' --max-time 15 \
              -H 'Cache-Control: no-cache' "$URL/" || echo 000)
            if [ "$CODE" = "200" ]; then
              echo "  ✓ public $URL returns 200 (rollback verified)"
              echo "✅ Public domain verified after rollback: \`$URL\` → 200" >> "$GITHUB_STEP_SUMMARY"
              exit 0
            fi
            echo "  attempt $i/15: code=$CODE — retrying…"
            sleep 4
          done
          STRICT=$(printf '%s' "$STRICT_PUBLIC_DOMAIN_CHECK" | tr '[:upper:]' '[:lower:]')
          if [ "$STRICT" = "true" ]; then
            echo "::error::Public domain still not healthy after rollback"
            echo "❌ Public verify FAILED after rollback (last code: $CODE)" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          echo "::warning::Public domain still returned ${CODE:-unknown} after rollback, but rollback already succeeded locally. Check proxy/cache separately."
          echo "⚠️ Public verify after rollback was not stable (last code: ${CODE:-unknown}); local rollback succeeded." >> "$GITHUB_STEP_SUMMARY"
