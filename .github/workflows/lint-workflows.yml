name: Lint workflows

on:
  pull_request:
    paths:
      - '.github/workflows/**'
      - 'scripts/ci/check-expression-length.py'
  workflow_dispatch:

concurrency:
  group: lint-workflows-${{ github.ref }}
  cancel-in-progress: true


jobs:
  expression-length:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check ${{ '${{ ... }}' }} expression length
        run: python3 scripts/ci/check-expression-length.py
