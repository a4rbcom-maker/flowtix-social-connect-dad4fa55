name: CI

on:
  # Deploy already builds on push. Keep CI for PRs/manual runs so GitHub
  # doesn't show the same install/build sequence multiple times per push.
  pull_request:
    paths-ignore:
      - '.github/workflows/**'
      - 'scripts/ci/check-expression-length.py'
  workflow_dispatch:

# Cancel older CI runs on the same branch when a new commit arrives —
# prevents stacked duplicate runs from rapid pushes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true


jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bunx tsc --noEmit

      - name: Build
        run: bun run build

      - name: Static check — HEAD handler present
        run: |
          if ! grep -q "HEAD: async" src/routes/api/public/health.ts; then
            echo "::error::HEAD handler missing in src/routes/api/public/health.ts"
            exit 1
          fi
          echo "✓ HEAD handler present"

      - name: Start preview server
        run: |
          (bun run start > /tmp/preview.log 2>&1 &) || (bunx vite preview --port 4173 > /tmp/preview.log 2>&1 &)
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:4173/api/public/health >/dev/null 2>&1 \
              || curl -fsS http://127.0.0.1:3000/api/public/health >/dev/null 2>&1; then
              echo "preview is up"; break
            fi
            sleep 2
          done

      - name: Verify /api/public/health (GET + HEAD)
        run: |
          BASE=""
          for p in 4173 3000; do
            if curl -fsS "http://127.0.0.1:$p/api/public/health" >/dev/null 2>&1; then
              BASE="http://127.0.0.1:$p"; break
            fi
          done
          if [[ -z "$BASE" ]]; then
            echo "::warning::preview did not start; skipping live HTTP probe"
            exit 0
          fi
          bash scripts/ci/verify-health-endpoint.sh "$BASE"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            dist
            .output
          if-no-files-found: ignore
          retention-days: 7
