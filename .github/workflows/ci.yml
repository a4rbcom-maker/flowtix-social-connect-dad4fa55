name: CI

on:
  # Deploy already builds on push. Keep CI for PRs/manual runs so GitHub
  # doesn't show the same install/build sequence multiple times per push.
  pull_request:
    paths-ignore:
      - '.github/workflows/**'
      - 'scripts/ci/check-expression-length.py'
  workflow_dispatch:

# Cancel older CI runs on the same branch when a new commit arrives —
# prevents stacked duplicate runs from rapid pushes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true


jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bunx tsc --noEmit

      - name: Build
        run: bun run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            dist
            .output
          if-no-files-found: ignore
          retention-days: 7
