name: Deploy VPS Worker

# Independent pipeline for the Facebook automation worker.
# Triggers ONLY when files inside vps-worker/ change, so it never
# interferes with the web deploy (deploy.yml).

on:
  push:
    branches: [main]
    paths:
      - 'vps-worker/**'
      - '.github/workflows/deploy-worker.yml'
  workflow_dispatch:

concurrency:
  group: deploy-worker
  cancel-in-progress: false

jobs:
  deploy-worker:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SERVER_IP: ${{ secrets.SERVER_IP }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          set -e
          ERR=0
          [ -n "${SSH_PRIVATE_KEY:-}" ] || { echo "::error::Missing secret SSH_PRIVATE_KEY"; ERR=1; }
          [ -n "${SERVER_USER:-}${SSH_USER:-}" ] || { echo "::error::Missing secret SERVER_USER or SSH_USER"; ERR=1; }
          [ -n "${SERVER_IP:-}${SSH_HOST:-}" ] || { echo "::error::Missing secret SERVER_IP or SSH_HOST"; ERR=1; }
          exit $ERR

      - name: Setup SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_IP: ${{ secrets.SERVER_IP }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          set -e
          HOST="${SERVER_IP:-${SSH_HOST:-}}"
          PORT="${SSH_PORT:-22}"
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$PORT" -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Sync vps-worker/ to server (staging path)
        env:
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SERVER_IP: ${{ secrets.SERVER_IP }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          set -e
          USER="${SERVER_USER:-${SSH_USER:-}}"
          HOST="${SERVER_IP:-${SSH_HOST:-}}"
          PORT="${SSH_PORT:-22}"

          # Rsync to a staging path owned by the SSH user. The install step
          # below moves it into /home/flowtix/vps-worker via sudo.
          ssh -p "$PORT" -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes \
            "${USER}@${HOST}" "mkdir -p ~/.flowtix-worker-staging"

          rsync -az --delete \
            -e "ssh -p ${PORT} -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes" \
            --exclude='.env' --exclude='node_modules/' \
            ./vps-worker/ "${USER}@${HOST}:~/.flowtix-worker-staging/"

      - name: Install dependencies and restart worker service
        env:
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SERVER_IP: ${{ secrets.SERVER_IP }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          set -e
          USER="${SERVER_USER:-${SSH_USER:-}}"
          HOST="${SERVER_IP:-${SSH_HOST:-}}"
          PORT="${SSH_PORT:-22}"

          ssh -p "$PORT" -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes \
            "${USER}@${HOST}" "bash -s" <<'EOSSH'
          set -euo pipefail

          TARGET="/home/flowtix/vps-worker"
          STAGING="$HOME/.flowtix-worker-staging"
          SERVICE="flowtix-worker"

          echo "==> Ensuring target dir exists: $TARGET"
          sudo mkdir -p "$TARGET"

          echo "==> Syncing staging -> $TARGET (preserving .env and node_modules)"
          sudo rsync -a --delete \
            --exclude='.env' \
            --exclude='node_modules/' \
            "$STAGING/" "$TARGET/"

          echo "==> Fixing ownership"
          sudo chown -R flowtix:flowtix "$TARGET"

          echo "==> Installing systemd unit (if changed)"
          if [ -f "$TARGET/flowtix-worker.service" ]; then
            sudo cp "$TARGET/flowtix-worker.service" "/etc/systemd/system/${SERVICE}.service"
            sudo systemctl daemon-reload
            sudo systemctl enable "$SERVICE" >/dev/null 2>&1 || true
          fi

          echo "==> Installing npm production deps"
          cd "$TARGET"
          sudo -u flowtix bash -lc "cd '$TARGET' && (npm ci --omit=dev 2>/dev/null || npm install --omit=dev)"

          echo "==> Restarting service: $SERVICE"
          sudo systemctl restart "$SERVICE"

          sleep 2
          echo "==> Service status:"
          sudo systemctl is-active "$SERVICE" || {
            echo "::error::Worker service is not active"
            sudo journalctl -u "$SERVICE" -n 50 --no-pager || true
            exit 1
          }

          echo "==> Deploy complete."
          EOSSH

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
